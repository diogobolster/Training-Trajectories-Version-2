<text x="584.0" y="518" class="tick" text-anchor="middle">195</text>
<line x1="86" y1="182.0" x2="750" y2="182.0" class="grid" />
<text x="78" y="186.0" class="tick" text-anchor="end">2.53</text>
<line x1="750.0" y1="76" x2="750.0" y2="500" class="grid" />
<text x="750.0" y="518" class="tick" text-anchor="middle">208</text>
