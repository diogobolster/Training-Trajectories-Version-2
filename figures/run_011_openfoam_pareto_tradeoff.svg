<circle cx="150.3" cy="287.5" r="7.0" fill="#111827" fill-opacity="0.82" stroke="#ffffff" stroke-width="1.8" />
<text x="161.3" y="291.5" class="small">Gaussian/Bayes</text>
<circle cx="262.9" cy="448.6" r="13.0" fill="#7c3aed" fill-opacity="0.82" stroke="#ffffff" stroke-width="1.8" />
<text x="279.9" y="452.6" class="small">hybrid</text>
