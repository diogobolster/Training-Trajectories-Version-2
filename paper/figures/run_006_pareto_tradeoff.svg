<svg xmlns="http://www.w3.org/2000/svg" width="960" height="580" viewBox="0 0 960 580">
<style>
  .title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
  .subtitle { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
  .axis { stroke: #374151; stroke-width: 1.2; }
  .grid { stroke: #e5e7eb; stroke-width: 1; }
  .tick { font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
  .label { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
  .legend { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
  .small { font: 10.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
  .cell { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; text-anchor: middle; }
  .stacklabel { font: 700 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
</style>
<rect x="0" y="0" width="960" height="580" fill="#ffffff" stroke="#fdfdfd" stroke-width="1" />
<rect x="959" y="579" width="1" height="1" fill="#f8f8f8" />
<text x="480.0" y="28" text-anchor="middle" class="title">No sampler dominates all transport metrics</text>
<text x="86.0" y="50.0" class="subtitle">Each point is a sampler averaged over four outer splits; smaller breakthrough and pair errors are better.</text>
<line x1="86" y1="500" x2="750" y2="500" class="axis" />
<line x1="86" y1="500" x2="86" y2="76" class="axis" />
<text x="20" y="288.0" text-anchor="middle" class="label" transform="rotate(-90 20,288.0)">pair-separation error</text>
<text x="418.0" y="564" text-anchor="middle" class="label">BTC error</text>
<line x1="86.0" y1="76" x2="86.0" y2="500" class="grid" />
<text x="86.0" y="518" class="tick" text-anchor="middle">42</text>
