<circle cx="685.7" cy="238.2" r="23.0" fill="#be123c" fill-opacity="0.82" stroke="#ffffff" stroke-width="1.8" />
<text x="712.7" y="242.2" class="small">pair rerank</text>
<text x="782.0" y="100.0" class="label" font-weight="700">encoding</text>
<text x="782.0" y="126.0" class="legend">circle size: dilution</text>
<text x="782.0" y="146.0" class="legend">log-MAE</text>
<text x="782.0" y="180.0" class="legend">lower-left is better</text>
<text x="782.0" y="214.0" class="legend">balanced objective</text>
</svg>
