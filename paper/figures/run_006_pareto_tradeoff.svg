<text x="78" y="504.0" class="tick" text-anchor="end">2.21</text>
<line x1="252.0" y1="76" x2="252.0" y2="500" class="grid" />
<text x="252.0" y="518" class="tick" text-anchor="middle">53</text>
<line x1="86" y1="394.0" x2="750" y2="394.0" class="grid" />
<text x="78" y="398.0" class="tick" text-anchor="end">2.34</text>
<line x1="418.0" y1="76" x2="418.0" y2="500" class="grid" />
<text x="418.0" y="518" class="tick" text-anchor="middle">64</text>
<line x1="86" y1="288.0" x2="750" y2="288.0" class="grid" />
<text x="78" y="292.0" class="tick" text-anchor="end">2.47</text>
<line x1="584.0" y1="76" x2="584.0" y2="500" class="grid" />
<text x="584.0" y="518" class="tick" text-anchor="middle">75</text>
<line x1="86" y1="182.0" x2="750" y2="182.0" class="grid" />
<text x="78" y="186.0" class="tick" text-anchor="end">2.60</text>
<line x1="750.0" y1="76" x2="750.0" y2="500" class="grid" />
<text x="750.0" y="518" class="tick" text-anchor="middle">86</text>
<line x1="86" y1="76.0" x2="750" y2="76.0" class="grid" />
<text x="78" y="80.0" class="tick" text-anchor="end">2.73</text>
<circle cx="267.4" cy="147.5" r="13.7" fill="#2563eb" fill-opacity="0.82" stroke="#ffffff" stroke-width="1.8" />
<text x="285.1" y="151.5" class="small">pooled mix</text>
<circle cx="150.3" cy="127.4" r="12.8" fill="#111827" fill-opacity="0.82" stroke="#ffffff" stroke-width="1.8" />
<text x="167.1" y="131.4" class="small">Gaussian/Bayes</text>
<circle cx="215.4" cy="196.3" r="7.0" fill="#7c3aed" fill-opacity="0.82" stroke="#ffffff" stroke-width="1.8" />
<text x="226.4" y="200.3" class="small">hybrid</text>
<circle cx="338.2" cy="242.2" r="17.4" fill="#0f766e" fill-opacity="0.82" stroke="#ffffff" stroke-width="1.8" />
<text x="359.7" y="246.2" class="small">mean mix</text>
<circle cx="615.3" cy="448.6" r="13.2" fill="#d97706" fill-opacity="0.82" stroke="#ffffff" stroke-width="1.8" />
